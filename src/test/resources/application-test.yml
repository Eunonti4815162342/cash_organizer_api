spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cash_organizer_test}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: cash_organizer

application:
  security:
    jwt:
      secret-key: test_jwt_secret_key_at_least_32_chars_for_ci
      expiration: 86400000
    cors:
      allowed-origins: http://localhost:8080

server:
  port: 8085

spring:
  mail:
    host: ""

app:
  mail:
    from: noreply@test.com

logging:
  level:
    root: WARN
    com.tritit.cashorganizer.api: INFO
