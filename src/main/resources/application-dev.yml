spring:
  datasource:
    url: jdbc:postgresql://192.168.1.145:5432/llama_finanzas
    username: llama_user
    password: llama_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: llama_finanzas

application:
  security:
    jwt:
      secret-key: "MyVerySecureSecretKeyForJwtTokenGenerationAndValidation"
      expiration: 86400000
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8085,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5000,http://127.0.0.1:5000,http://localhost:60884}

server:
  port: 8085
  error:
    include-message: always
    include-stacktrace: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.springframework.boot: WARN
    org.springframework.security: WARN
    com.tritit.cashorganizer.api: INFO
    org.hibernate: WARN
    org.liquibase: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cash-organizer-dev.log
