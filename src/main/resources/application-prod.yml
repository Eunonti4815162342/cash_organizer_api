spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://prod-db:5432/cash_organizer}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 30
          fetch_size: 100
          use_scrollable_resultset: true
        order_inserts: true
        order_updates: true
        generate_statistics: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: cash_organizer
    contexts: prod

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION:86400000}
    cors:
      allowed-origins: https://cashorganizer.com,https://app.cashorganizer.com

server:
  port: ${SERVER_PORT:8085}
  error:
    include-message: on-param
    include-stacktrace: never
  compression:
    enabled: true
    min-response-size: 1024
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 10000

logging:
  level:
    root: ERROR
    org.springframework.security: WARN
    com.tritit.cashorganizer.api: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/cash-organizer/production.log
    max-size: 500MB
    max-history: 90
    total-size-cap: 10GB

management:
  endpoints:
    web:
      exposure: include=health,metrics,info
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      simple:
        enabled: true
