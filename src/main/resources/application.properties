# --- CONFIGURACIÓN DE BASE DE DATOS POSTGRES ---
spring.datasource.url=jdbc:postgresql://192.168.1.145:5432/llama_finanzas
spring.datasource.username=llama_user
spring.datasource.password=llama_password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
# Cambiamos ddl-auto a 'update' temporalmente para que Hibernate cree las tablas 
# si Liquibase falla, y así no detener el desarrollo del front.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- LIQUIBASE ---
# Desactivamos Liquibase un momento para ver si Hibernate logra crear el esquema
# Esto nos dirá si el problema es de permisos de Liquibase.
spring.liquibase.enabled=false

# --- LOGGING ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- SERVER ---
server.port=8080
