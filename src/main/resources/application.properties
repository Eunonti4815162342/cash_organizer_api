# --- CONFIGURACIÓN DE BASE DE DATOS POSTGRES ---
spring.datasource.url=jdbc:postgresql://192.168.1.145:5432/llama_finanzas
spring.datasource.username=llama_user
spring.datasource.password=llama_password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
# Cambiamos ddl-auto a 'update' temporalmente para que Hibernate cree las tablas 
# si Liquibase falla, y así no detener el desarrollo del front.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- LIQUIBASE ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=cash_organizer

# --- LOGGING ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- SERVER ---
server.port=8080
