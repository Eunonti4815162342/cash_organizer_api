# NATAVE Backend - Default Configuration
# Use Spring profiles to override: spring.profiles.active=dev|staging|prod
#
# Development:  ./gradlew bootRun --args='--spring.profiles.active=dev'
# Staging:      ./gradlew bootRun --args='--spring.profiles.active=staging'
# Production:   ./gradlew bootRun --args='--spring.profiles.active=prod'
#
# Or via environment variable: export SPRING_PROFILES_ACTIVE=prod

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/natave_dev}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: natave

# spring.mail is intentionally absent from this base config.
# When MAIL_HOST is not set, Spring Boot skips MailSenderAutoConfiguration
# entirely — no JavaMailSender bean, no MailHealthIndicator failure.
# Configure via environment variables (MAIL_HOST, MAIL_PORT, MAIL_USERNAME,
# MAIL_PASSWORD) or in application-prod.yml for production.

app:
  mail:
    from: ${MAIL_FROM:noreply@natave.com}

management:
  health:
    mail:
      enabled: false

application:
  name: natave-api
  version: 1.0.0
  security:
    jwt:
      # IMPORTANT: In production, ALWAYS use environment variable JWT_SECRET_KEY
      # Never commit actual secret keys to version control
      secret-key: ${JWT_SECRET_KEY:default_dev_key_change_in_non_dev_environments}
      expiration: ${JWT_EXPIRATION:86400000}
    cors:
      # Default: localhost only. Override per environment in application-{profile}.yml
      allowed-origins: http://localhost:8080,http://localhost:8085

server:
  port: ${SERVER_PORT:8085}
  error:
    include-message: always
    include-stacktrace: always

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    com.tritit.cashorganizer.api: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/natave.log
