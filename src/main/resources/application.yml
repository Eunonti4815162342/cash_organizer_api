spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://192.168.1.145:5432/llama_finanzas}
    username: ${SPRING_DATASOURCE_USERNAME:llama_user}
    password: ${SPRING_DATASOURCE_PASSWORD:llama_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: cash_organizer

application:
  security:
    jwt:
      # Valor por defecto solo para desarrollo local. En producción se inyectará vía variable de entorno.
      secret-key: ${JWT_SECRET_KEY:dev_secret_key_must_be_changed_in_production_404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:8085,http://localhost,http://100.86.48.34,http://192.168.1.192,http://100.*.*.*}


server:
  port: ${SERVER_PORT:8085}
  error:
    include-message: always

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    com.tritit.cashorganizer.api: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/cash-organizer-audit.log
